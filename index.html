<!doctype html>
<html lang="en">
  <head>
    <script>
      // Apply theme before the app loads to avoid a flash of the wrong theme.
      // Claro's brand design is dark-glassmorphism-first, so we default to
      // dark unless the user explicitly chose light, or their OS prefers light
      // AND they've never visited before.
      try {
        const t = localStorage.getItem('theme')
        if (t === 'light') {
          document.documentElement.classList.remove('dark')
        } else {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claro | AI Email Agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
